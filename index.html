<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Chat IA Protheus</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
}

.chat {
    width: 700px;
    height: 95vh;
    display: flex;
    flex-direction: column;
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
}

.header {
    padding: 15px;
    background: #020617;
    text-align: center;
    font-weight: bold;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.msg {
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #334155;
    margin-right: auto;
}

.input-area {
    display: flex;
    padding: 10px;
    background: #020617;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px 15px;
    background: #22c55e;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
    <div class="header">🤖 Chat IA Protheus</div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="pergunta" placeholder="Digite sua pergunta...">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>

function scrollAuto() {
    const messages = document.getElementById("messages");
    messages.scrollTop = messages.scrollHeight;
}

function adicionarMensagem(texto, classe) {
    const div = document.createElement("div");
    div.className = "msg " + classe;
    div.innerText = texto;
    document.getElementById("messages").appendChild(div);
    scrollAuto();
    return div;
}

// efeito digitando letra por letra
async function escreverTexto(elemento, texto) {
    elemento.innerText = "";
    for (let i = 0; i < texto.length; i++) {
        elemento.innerText += texto[i];
        scrollAuto();
       // await new Promise(r => setTimeout(r, 10)); // velocidade
        await new Promise(r => setTimeout(r, 2));        
    }
}

async function enviar() {
    const input = document.getElementById("pergunta");
    const pergunta = input.value.trim();

    if (!pergunta) return;

    adicionarMensagem(pergunta, "user");
    input.value = "";

    // cria mensagem vazia do bot
    const botMsg = adicionarMensagem("", "bot");

    const response = await fetch(`http://127.0.0.1:8000/chat?pergunta=${encodeURIComponent(pergunta)}`);

    const reader = response.body.getReader();
    const decoder = new TextDecoder("utf-8");

    let texto = "";

    while (true) {
        const { done, value } = await reader.read();

        if (done) break;

        texto += decoder.decode(value);

        botMsg.innerText = texto;
        scrollAuto();
    }
}
